name: Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Push to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        git config --global user.email "anandnajwale2025@gmail.com"
        git config --global user.name "github-actions"

        git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE hf-space

        rsync -av --exclude='.git' ./ hf-space/

        cd hf-space

        git add .
        git commit -m "Deploy from GitHub Actions" || echo "No changes"

        git push